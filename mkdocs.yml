site_name: ArchBox
site_description: ARCH/GARCH volatility models for financial time series
site_url: https://archbox.nodesecon.com
repo_url: https://github.com/nodesecon/archbox
repo_name: nodesecon/archbox

theme:
  name: material
  palette:
    - scheme: default
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Key Concepts: getting-started/key-concepts.md
  - User Guide:
    - GARCH: user-guide/garch.md
    - EGARCH: user-guide/egarch.md
    - GJR-GARCH: user-guide/gjr.md
    - Multivariate: user-guide/multivariate.md
    - Regime-Switching: user-guide/regime.md
    - Threshold/STAR: user-guide/threshold.md
    - Risk Management: user-guide/risk.md
    - Distributions: user-guide/distributions.md
  - API Reference:
    - Core: api/core.md
    - Models: api/models.md
    - Multivariate: api/multivariate.md
    - Regime: api/regime.md
    - Risk: api/risk.md
    - Diagnostics: api/diagnostics.md
  - Theory:
    - GARCH Models: theory/garch-theory.md
    - Multivariate GARCH: theory/multivariate-theory.md
    - Regime-Switching: theory/regime-theory.md
    - Risk Measures: theory/risk-theory.md
  - Benchmarks: benchmarks/performance.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nodesecon/archbox
